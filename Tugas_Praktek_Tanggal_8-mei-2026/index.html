<!DOCTYPE html>
<!-- ini ngasih tau browser kalau file ini pakai HTML versi terbaru (HTML5) -->

<html lang="id"> 
<!-- tag pembungkus seluruh halaman HTML, lang="id" berarti bahasa utama indonesia -->

<head>
  <!-- bagian head berisi konfigurasi halaman, tidak tampil langsung di website -->

  <meta charset="UTF-8">
  <!-- menentukan encoding karakter supaya semua teks terbaca normal -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- mengatur tampilan supaya responsif di hp dan berbagai ukuran layar -->

  <title>Website Sederhana</title>
  <!-- judul halaman yang muncul di tab browser -->

<style>
  /* 
    tag style digunakan untuk menuliskan CSS langsung di HTML
    berfungsi untuk mengatur tampilan seperti warna, font, dan layout
  */

  body {
    font-family: Arial, sans-serif; 
    /* font utama halaman */

    margin: 0;  
    /* menghilangkan margin default browser */

    background: #f4f4f4; 
    /* warna latar belakang halaman */
  }

  header {
    background: #333; 
    /* warna background header */

    color: white; 
    /* warna teks */

    padding: 15px; 
    /* jarak dalam header */

    text-align: center; 
    /* posisi teks di tengah */
  }

  nav {
    background: #555; 
    /* warna background navbar */

    padding: 10px; 
    /* jarak dalam navbar */

    text-align: center; 
    /* posisi menu di tengah */
  }

  nav a {
    color: white; 
    /* warna teks link */

    margin: 0 10px; 
    /* jarak antar link */

    text-decoration: none; 
    /* menghilangkan garis bawah */
  }

  nav a:hover {
    text-decoration: underline; 
    /* efek saat mouse diarahkan */
  }

  main {
    padding: 20px; 
    /* jarak isi konten utama */
  }

  section {
    margin-bottom: 20px; 
    /* jarak antar section */

    background: white; 
    /* background section */

    padding: 15px; 
    /* jarak isi section */

    border-radius: 8px; 
    /* sudut melengkung */

    box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    /* bayangan ringan */
  }

  footer {
    background: #333; 
    /* warna background footer */

    color: white; 
    /* warna teks */

    text-align: center; 
    /* posisi teks */

    padding: 10px; 
    /* jarak dalam footer */

    position: fixed; 
    /* posisi tetap di layar */

    bottom: 0; 
    /* ditempel di bagian bawah */

    width: 100%; 
    /* lebar penuh */
  }

  button {
    padding: 10px 15px; 
    /* ukuran tombol */

    background: #28a745; 
    /* warna tombol */

    color: white; 
    /* warna teks */

    border: none; 
    /* tanpa border */

    border-radius: 5px; 
    /* sudut membulat */

    cursor: pointer; 
    /* kursor berubah jadi pointer saat diarahkan */
  }
</style>
</head>

<body>
<!-- body adalah isi utama website, semua yang terlihat user ada di sini -->

<header>
  <!-- header adalah bagian atas website, biasanya berisi judul atau deskripsi -->

  <h1>Website Satu File</h1>
  <!-- h1 adalah heading utama (judul terbesar dan paling penting) -->

  <p>HTML + CSS + JavaScript dalam satu file</p>
  <!-- p digunakan untuk menampilkan teks/paragraf -->
</header>

<nav>
  <!-- nav digunakan untuk menu navigasi antar bagian halaman -->

  <a href="#home">Home</a>
  <!-- a (anchor) adalah link, href mengarah ke id tertentu -->

  <a href="#about">About</a>
  <!-- link ke section about -->

  <a href="#contact">Contact</a>
  <!-- link ke section contact -->
</nav>

<main>
  <!-- main adalah area konten utama halaman -->

  <section id="home">
    <!-- section digunakan untuk membagi konten menjadi beberapa bagian -->

    <h2>Home</h2>
    <!-- h2 adalah sub judul (di bawah h1) -->

    <p>Ini adalah halaman utama website sederhana.</p>

    <button onclick="tampilkanPesan()">Klik Saya</button>
    <!-- button adalah tombol, onclick untuk menjalankan fungsi javascript saat diklik -->
  </section>

  <section id="about">
    <!-- section untuk bagian tentang -->

    <h2>About</h2>
    <p>Website ini dibuat dalam satu file menggunakan HTML, CSS, dan JavaScript.</p>
  </section>

  <section id="contact">
    <!-- section untuk bagian kontak -->

    <h2>Contact</h2>

    <form onsubmit="kirimForm(event)">
      <!-- form digunakan untuk input data user -->

      <label>Nama:</label><br>
      <!-- label adalah teks penjelas untuk input -->

      <input type="text" id="nama" required><br><br>
      <!-- input text untuk isi nama, required berarti wajib diisi -->

      <label>Email:</label><br>
      <!-- label untuk email -->

      <input type="email" required><br><br>
      <!-- input email untuk validasi format email -->

      <button type="submit">Kirim</button>
      <!-- tombol submit untuk mengirim data form -->
    </form>
  </section>
</main>

<footer>
  <!-- footer adalah bagian bawah website, biasanya isi copyright -->

  <p>&copy; 2026 Website Sederhana</p>
</footer>

<script>
  // tag script digunakan untuk menulis javascript agar website bisa interaktif

  function tampilkanPesan() {
    // fungsi ini dijalankan saat tombol diklik
    alert("Halo! Ini JavaScript dalam satu file.");
  }

  function kirimForm(event) {
    // fungsi ini dijalankan saat form dikirim

    event.preventDefault();
    // mencegah reload halaman

    const nama = document.getElementById("nama").value;
    // mengambil nilai dari input nama

    alert("Terima kasih, " + nama + "! Pesan Anda terkirim.");
    // menampilkan pesan ke user
  }
</script>

</body>
</html>
