<!DOCTYPE html>
<!-- fungsinya untuk memastikan situs web tampil konsisten dan benar di berbagai browser sesuai standar HTML5, serta mencegah kesalahan tampilan (rendering). -->

<html lang="id"> 
<!-- lang="id" berarti bahasa utama indonesia -->

<head>
  <!-- bagian head berisi konfigurasi halaman, tidak tampil didalam website -->

  <meta charset="UTF-8">
  <!-- agar semua karakter dan teks terbaca normal diweb -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- mengatur tampilan supaya responsif di hp dan berbagai ukuran layar -->

  <title>Website Sederhana</title>
  <!-- judul halaman yang muncul di tab browser -->

<style>
  /* 
    tag style digunakan untuk menuliskan CSS langsung di HTML (inline) berfungsi untuk mengatur tampilan website */

  body {
    font-family: Arial, sans-serif; 
    /* font untuk semua halaman didalam body */

    margin: 0;  
    /* menghilangkan margin default */

    background: #f4f4f4; 
    /* warna latar belakang body */
  }

  header {
    background: #333; 
    /* untuk warna background header */

    color: white; 
    /* untuk warna teks didalam header */

    padding: 15px; 
    /* jarak dalam header */

    text-align: center; 
    /* buat posisi teks di tengah-tengah */
  }

  nav {
    background: #555; 
    /* warna background navbar */

    padding: 10px; 
    /* jarak dalam navbar */

    text-align: center; 
    /* posisi isi navbar berada di tengah */
  }

  nav a {
    color: white; 
    /* untuk warna teks link */

    margin: 0 10px; 
    /* jarak antar link */

    text-decoration: none; 
    /* menghilangkan garis bawah di tag a */
  }

  nav a:hover {
    text-decoration: underline; 
    /* efek saat mouse diarahkan ke tag a */
  }

  main {
    padding: 20px; 
    /* jarak isi dari tag main */
  }

  section {
    margin-bottom: 20px; 
    /* jarak bawah section */

    background: white; 
    /* untuk background section */

    padding: 15px; 
    /* jarak dalam section */

    border-radius: 8px; 
    /* sudut melengkung dari section */

    box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    /* bayangan dibelakang section */
  }

  footer {
    background: #333; 
    /* warna background dari footer */

    color: white; 
    /* warna teks didalam footer */

    text-align: center; 
    /* posisi teks didalam footer */

    padding: 10px; 
    /* jarak dalam footer */

    position: fixed; 
    /* posisi tetap di layar */

    bottom: 0; 
    /* ditempel di bagian bawah */

    width: 100%; 
    /* fungsinya untuk layar full horizontal */
  }

  button {
    padding: 10px 15px; 
    /* untuk ukuran tombol */

    background: #28a745; 
    /* warna tombol */

    color: white; 
    /* warna teks didalam button */

    border: none; 
    /* tidak ada border */

    border-radius: 5px; 
    /* untuk membengkokkan dari setiap sisi button */

    cursor: pointer; 
    /* kursor berubah jadi pointer saat diarahkan diatas button */
  }
</style>
</head>

<body>
<!-- body adalah isi dalem website, semua yang terlihat user ada di sini -->

<header>
  <!-- header untuk bagian atas website -->

  <h1>Website Satu File</h1>
  <!-- h1 digunakan untuk menampilkan tulisan besar -->

  <p>HTML + CSS + JavaScript dalam satu file</p>
  <!-- p digunakan untuk menampilkan paragraf -->
</header>

<nav>
  <!-- nav untuk menu navigasi yang bisa untuk pindah halaman atau page -->

  <a href="#home">Home</a>
  <!-- a href berisi link untuk mengarahkan ke id tertuju -->

  <a href="#about">About</a>
  <!-- sama seperti yang diatas -->

  <a href="#contact">Contact</a>
  <!-- sama seperti yang diatas -->
</nav>

<main>
  <!-- ini berisi sebuah beberapa konten setelah header -->

  <section id="home">
    <!-- disini section digunakan untuk membagi konten menjadi beberapa bagian, Disini section untuk home -->

    <h2>Home</h2>
    <!-- h2 adalah tulisan besar dibawah h1 ( jadi ga terlalu besar seperti h1 ) -->

    <p>Ini adalah halaman utama website sederhana.</p>

    <button onclick="tampilkanPesan()">Klik Saya</button>
    <!-- tombol, dengan function onclick yang berfungsi untuk menjalankan fungsi javascript saat diklik -->
  </section>

  <section id="about">
    <!-- disini section digunakan untuk membagi konten menjadi beberapa bagian, Disini section untuk tentang -->

    <h2>About</h2>
    <p>Website ini dibuat dalam satu file menggunakan HTML, CSS, dan JavaScript.</p>
  </section>

  <section id="contact">
    <!-- disini section digunakan untuk membagi konten menjadi beberapa bagian, Disini section untuk kontak -->

    <h2>Contact</h2>

    <form onsubmit="kirimForm(event)">
      <!-- form digunakan untuk input data dari pengguna atau user -->

      <label>Nama:</label><br>
      <!-- ini untuk teks penjelas diatas input -->

      <input type="text" id="nama" required><br><br>
      <!-- input text untuk isi nama, yang wajid diisi karena ada required -->

      <label>Email:</label><br>
      <!-- ini untuk teks penjelas diatas input -->

      <input type="email" required><br><br>
      <!-- input email untuk format email -->

      <button type="submit">Kirim</button>
      <!-- untuk mengirim data dari form yang diisi oleh pengguna -->
    </form>
  </section>
</main>

<footer>
  <!-- footer adalah bagian bawah website -->

  <p>&copy; 2026 Website Sederhana</p>
</footer>

<script>
  // tag script digunakan untuk menulis javascript

  function tampilkanPesan() {
    // fungsi ini dijalankan saat tombol <button onclick="tampilkanPesan()">Klik Saya</button> diklik
    alert("Halo! Ini JavaScript dalam satu file.");
  }

  function kirimForm(event) {
    // fungsi ini berjalan saat form dikirim

    event.preventDefault();
    // mencegah halaman reload

    const nama = document.getElementById("nama").value;
    // tujuannya mengambil value "nama" yang ada dihtml untuk masuk ke const nama

    alert("Terima kasih, " + nama + "! Pesan Anda terkirim.");
    // menampilkan alert yang ada di atas yang berisi pesan
  }
</script>

</body>
</html>
